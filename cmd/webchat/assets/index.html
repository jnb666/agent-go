<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GPT Chat</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css" integrity="sha384-X38yfunGUhNzHpBaEBsWLO+A0HDYOQi8ufWDkZ0k9e0eXz/tH3II7uKZ9msv++Ls" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.38/dist/katex.min.css" integrity="sha384-/L6i+LN3dyoaK2jYG5ZLh5u13cjdsPDcFOSNJeFBFa/KgVXR5kOfTdiN3ft1uMAq" crossorigin="anonymous">
    <link rel="stylesheet" href="chat.css">
  </head>
  <body>
    <div class="chat-menu">
      <div class="chat-menu-left">
        <span id="model-name" class="heading-text"></span>
        <span class="chat-menu-spacer"></span>
        <label id="stats-prompt"></label>
        <span class="chat-menu-spacer"></span>
        <label id="stats-gen"></label>
        <span class="chat-menu-spacer"></span>
        <label id="stats-tools"></label>
        <span class="chat-menu-spacer"></span>
        <label id="stats-time"></label>
        <span id="error-message" class="error-text"></span>
      </div>
      <div class="chat-menu-right pure-form">
        <label for="reasoning-history"><input id="reasoning-history" type="checkbox"> show all reasoning</label>
        <span class="chat-menu-spacer"></span>
        <button id="new-chat" class="button-small pure-button pure-button-primary">new chat</button>
        <span class="chat-menu-spacer"></span>
        <button id="del-chat" class="button-small pure-button pure-button-primary">delete</button>
        <span class="chat-menu-spacer"></span> 
        <button id="options" class="button-small pure-button pure-button-primary">options</button>
      </div>
    </div>
    <div id="nav">
      <div class="pure-menu">
        <span class="pure-menu-heading heading-text">Conversations</span>
        <ul id="conv-list" class="pure-menu-list">
        </ul>
      </div>
    </div>
    <ol id="chat-list">
    </ol>
    <div id="config-page" style="display: none;">
      <form id="config-form" class="pure-form pure-form-aligned">
        <label>model:</label>
        <div>
          <select id="model-select" name="model">
          </select>
        </div>
        <label>system prompt:</label>
        <div>
          <textarea name="system"></textarea>
        </div>
        <label>context size:</label>
        <div>
          <input name="context_size" type="text">
        </div>
        <label>temperature:</label>
        <div>
          <input name="temperature" type="text">
        </div>
        <label>top P:</label>
        <div>
          <input name="top_p" type="text">
        </div>
        <label>top K:</label>
        <div>
          <input name="top_k" type="text">
        </div>
        <label>presence penalty:</label>
        <div>
          <input name="presence_penalty" type="text">
        </div>
        <label>repetition penalty:</label>
        <div>
          <input name="repetition_penalty" type="text">
        </div>
        <label>reasoning effort:</label>
        <div>
          <fieldset>
            <input id="reasoning-none" name="reasoning" value="none" type="radio"> <label for="reasoning-none">none</label> &nbsp;
            <input id="reasoning-low" name="reasoning" value="low" type="radio"> <label for="reasoning-low">low</label> &nbsp;
            <input id="reasoning-medium" name="reasoning" value="medium" type="radio"> <label for="reasoning-medium">medium</label> &nbsp;
            <input id="reasoning-high" name="reasoning" value="high" type="radio"> <label for="reasoning-high">high</label> &nbsp;
          </fieldset>
        </div>
        <label>tools:</label>
        <div>
          <fieldset id="tools-list">
          </fieldset>
        </div>
        <div></div>
        <div>
          <button type="submit" class="pure-button pure-button-primary">update config</button>
        </div>
      </form>      
    </div>
    <div id="input-box" class="typezone">
      <textarea id="input-text" class="input-default" placeholder="Type a message (Shift+Enter to add a new line)"></textarea>
      <div class="send"><button id="send-button" class="button-small pure-button pure-button-primary"><img src="send.svg" class="icon"> send</button></div>
    </div>
    <script src="chat.js"></script>
  </body>
</html>
